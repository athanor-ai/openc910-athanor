name: export-safety

# ATH-2960: fail-closed export-safety gate for this PUBLIC fork.
# Runs the committed-tree leak scan + receipt verifier on every PR and every
# push to main, AND scans the PR body + conversation/review comments on every
# event that can ADD text to those public surfaces:
#   - pull_request opened/synchronize/reopened/EDITED  (body edits)
#   - issue_comment created/edited                     (conversation comments)
#   - pull_request_review_comment created/edited       (diff review comments)
# Trigger-surface hardening (ATH-2960 extension): a leak added via a later
# body-edit or a new comment lives on a public surface; the scan is only as
# good as the events that fire it. Intended to be a REQUIRED status check.

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  export-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for committed-tree scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Committed-tree scan only runs where the tree can change (PR / push).
      # Comment events do not change the tree; on those the checkout is the
      # default branch, so a committed-tree scan there would be misleading.
      - name: Export-safety gate (committed-tree leak scan + receipt verifier)
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: python3 athanor/export_safety_gate.py --ref HEAD

      # Public receipt INTEGRITY (auditor-grade): SHA256SUMS binds every shipped
      # file (present->listed, not just listed->present), each metric-claiming
      # packet ships a self-checking replay.sh, and every AREA a receipt claims
      # is parsed from a SHA-bound pinned log -- never self-certified. Reads the
      # committed tree, so it runs on the same PR/push gate (not comment events).
      - name: Verify public receipt integrity (SHA256SUMS binding + replay + receipt-to-log)
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: python3 athanor/verify_public_receipts.py

      - name: Public README contract
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: python3 athanor/check_public_readme.py

      # ATH-2966 (part 2): every public replay.sh must REQUIRE its pinned tool env
      # vars via ${VAR:?...} (fail-loud if unset) and NEVER default them -- so a
      # future packet cannot ship a ${VAR:-<internal path>} default that both
      # leaks build-dir infra and lets a proof run against an unpinned/ambient tool.
      # Complements the committed-tree internal-path byte-leak scan above.
      - name: Replay explicit-env gate (ATH-2966)
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: python3 athanor/check_replay_env.py

      # Regression protection for the VERIFIER ITSELF. The step above runs the
      # live verifier over the REAL (clean) packets, so a verifier leg silently
      # neutered to `return []` still exits 0 -- CI stays GREEN on a broken
      # verifier. These bites tamper each invariant (missing authority block,
      # unbound candidate SHA, wrong-candidate metric binding, decorative
      # red-control, SHA256SUMS path-escape, ...) and assert the matching leg
      # REDS. Wiring them into CI makes a future verifier regression FAIL the
      # gate instead of passing silently. Proven load-bearing: neutering
      # _verify_customer_ready_authority leaves the live verifier at exit 0 but
      # reds these bites. Reads the committed tree -> same PR/push gate.
      - name: Verify receipt-verifier bites (regression protection for the verifier)
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: |
          python3 -m pip install --quiet pytest
          PYTHONPATH=. python3 -m pytest -q tests/test_verify_public_receipts.py

      # Export-safety GATE bites (the leak-scanner is subject-under-test). #39
      # shipped tests/test_export_safety_gate.py but the runner names test files
      # explicitly, so it never ran in CI -- a committed test is un-gated unless
      # named. Pin it here beside the verifier bites: covers the kairos.<ns>
      # namespace BLOCK, the case/hyphen-widened ticket WARN, tier-preservation,
      # and the seeded-secret sole-discriminator bite, so a mutation to the gate
      # patterns REDS in CI instead of passing silently.
      - name: Verify export-safety gate bites (regression protection for the leak scanner)
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: |
          python3 -m pip install --quiet pytest
          PYTHONPATH=. python3 -m pytest -q tests/test_export_safety_gate.py

      # ATH-3010: the one-command replay wrapper (replay_public_receipt.py) is the
      # first README path for reproducing a public receipt. Its bites hide/corrupt
      # a pinned tool (wrong yosys version, tampered Liberty bytes, missing suite)
      # and assert the wrapper fails loud with a named provisioning error BEFORE any
      # verdict-bearing replay -- so a regression that silently accepts an ambient or
      # mismatched tool (reproducing nothing, or the wrong bytes) REDS in CI. Same
      # "un-gated unless named" hazard as the verifier/gate bites above.
      - name: Verify one-command replay wrapper bites (ATH-3010)
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: |
          python3 -m pip install --quiet pytest
          PYTHONPATH=. python3 -m pytest -q tests/test_replay_public_receipt.py

      # PR body + review/issue comments are public surfaces the committed-tree
      # scan cannot see. Scan them with the SAME BLOCK_ALWAYS set (single source
      # of truth: export_safety_gate.py --scan-text). Runs on PR events AND on
      # PR comment events (conversation + review-diff), confined to real PRs.
      #
      # Two-layer input so an API-sweep failure can never MASK the triggering
      # surface:
      #   (1) payload text for THIS event (always present for its event type):
      #       PR_BODY on pull_request, COMMENT_BODY on a comment event.
      #   (2) a full live API sweep (body + all conversation + all review
      #       comments) as defense-in-depth; its failure is swallowed (|| true)
      #       and therefore cannot hide a leak found in (1).
      # Both feed one --scan-text (verdict=exit1, tool-error=exit2, clean=exit0).
      # Text is passed via env, never interpolated into the shell (injection-safe).
      - name: Export-safety PR-text scan (body + conversation + review comments)
        if: >
          github.event_name == 'pull_request' ||
          (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
          github.event_name == 'pull_request_review_comment'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number || github.event.issue.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          {
            printf '%s\n' "$PR_BODY"
            printf '%s\n' "$COMMENT_BODY"
            gh api "repos/$REPO/pulls/$PR" --jq '.body' 2>/dev/null || true
            gh api "repos/$REPO/issues/$PR/comments" --jq '.[].body' 2>/dev/null || true
            gh api "repos/$REPO/pulls/$PR/comments" --jq '.[].body' 2>/dev/null || true
          } | python3 athanor/export_safety_gate.py --scan-text
