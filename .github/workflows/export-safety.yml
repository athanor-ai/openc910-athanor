name: export-safety

# ATH-2960: fail-closed export-safety gate for this PUBLIC fork.
# Runs the committed-tree leak scan + receipt verifier on every PR and every
# push to main. Intended to be a REQUIRED status check (branch protection).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  export-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for committed-tree scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Export-safety gate (committed-tree leak scan + receipt verifier)
        run: python3 athanor/export_safety_gate.py --ref HEAD

      # PR bodies + review/issue comments are public surfaces the committed-tree
      # scan cannot see. Scan them with the same BLOCK_ALWAYS set (single source
      # of truth). PR text is passed via env, never interpolated into the shell,
      # to avoid script injection.
      - name: Export-safety PR-text scan (PR body + comments)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          {
            printf '%s\n' "$PR_BODY"
            gh api "repos/$REPO/issues/$PR/comments" --jq '.[].body' 2>/dev/null || true
            gh api "repos/$REPO/pulls/$PR/comments" --jq '.[].body' 2>/dev/null || true
          } | python3 athanor/export_safety_gate.py --scan-text
